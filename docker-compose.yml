services:
    auth-db:
        image: postgres:17
        container_name: relay-auth-db
        restart: unless-stopped

        environment:
            POSTGRES_DB: relay_auth_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres

        ports:
            - "5433:5432"

        volumes:
            - auth-db-data:/var/lib/postgresql/data

    social-db:
        image: postgres:17
        container_name: relay-social-db
        restart: unless-stopped

        environment:
            POSTGRES_DB: relay_social_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres

        ports:
            - "5434:5432"

        volumes:
            - social-db-data:/var/lib/postgresql/data

    auth-service:
        build:
            context: .
            dockerfile: AuthService/AuthService.Api/Dockerfile

        container_name: relay-auth-service
        restart: unless-stopped

        depends_on:
            - auth-db
            - rabbitmq

        environment:
            RabbitMQ__Host: rabbitmq
            RabbitMQ_Username: guest
            RabbitMQ_Password: guest
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__DefaultConnection: Host=auth-db;Port=5432;Database=relay_auth_db;Username=postgres;Password=postgres

        ports:
            - "5001:8080"

    minio:
        image: minio/minio
        container_name: relay-minio
        restart: unless-stopped

        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin

        ports:
            - "9000:9000"
            - "9001:9001"

        command: server /data --console-address ":9001"

    rabbitmq:
        image: rabbitmq:4-management
        container_name: relay-rabbitmq
        hostname: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest

volumes:
    auth-db-data:
    social-db-data:
    minio-data:
