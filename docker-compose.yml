services:
    auth-db:
        image: postgres:17
        container_name: relay-auth-db
        restart: unless-stopped

        environment:
            POSTGRES_DB: relay_auth_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres

        ports:
            - "5433:5432"

        volumes:
            - auth-db-data:/var/lib/postgresql/data

volumes:
    auth-db-data:
